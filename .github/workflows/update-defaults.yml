name: Update Runtime Defaults

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-defaults:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Generate defaults
        run: pnpm tsx lib/scripts/generate-defaults.mts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build, typecheck, and test
        if: steps.changes.outputs.changed == 'true'
        run: |
          pnpm run lint:fix
          pnpm run typecheck
          pnpm run build
          pnpm run test

      - name: Create PR with updated defaults
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="chore/update-defaults-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete existing remote branch if present (from a prior failed run)
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add src/data/
          git commit -m "chore: update runtime defaults

          Signed-off-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update runtime defaults" \
            --body "Automated daily update of bundled runtime version data." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
