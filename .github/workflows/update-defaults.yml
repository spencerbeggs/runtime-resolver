name: Update Runtime Defaults

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: read

jobs:
  update-defaults:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup Runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Generate defaults
        run: pnpm tsx lib/scripts/generate-defaults.mts
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Lint generated files
        run: pnpm run lint:fix

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Add changeset
        if: steps.changes.outputs.changed == 'true'
        run: |
          printf '%s\n' '---' '"runtime-resolver": patch' '---' '' '## Other' '' '- Updated bundled runtime version defaults' > .changeset/update-defaults.md

      - name: Build, typecheck, and test
        if: steps.changes.outputs.changed == 'true'
        run: |
          pnpm run typecheck
          pnpm run build
          pnpm run test

      - name: Create PR with updated defaults
        id: create-pr
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          branch: chore/update-defaults
          commit-message: |
            chore: update runtime defaults

            Signed-off-by: ${{ vars.APP_BOT_NAME }} <${{ vars.APP_BOT_ID }}+${{ vars.APP_BOT_NAME }}@users.noreply.github.com>
          committer: ${{ vars.APP_BOT_NAME }} <${{ vars.APP_BOT_ID }}+${{ vars.APP_BOT_NAME }}@users.noreply.github.com>
          author: ${{ vars.APP_BOT_NAME }} <${{ vars.APP_BOT_ID }}+${{ vars.APP_BOT_NAME }}@users.noreply.github.com>
          title: "chore: update runtime defaults"
          body: "Automated daily update of bundled runtime version data."
          add-paths: |
            src/data/
            .changeset/update-defaults.md

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
