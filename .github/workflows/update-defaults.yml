name: Update Runtime Defaults

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: read

jobs:
  update-defaults:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup Runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Generate defaults
        run: pnpm tsx lib/scripts/generate-defaults.mts
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build, typecheck, and test
        if: steps.changes.outputs.changed == 'true'
        run: |
          pnpm run lint:fix
          pnpm run typecheck
          pnpm run build
          pnpm run test

      - name: Create PR with updated defaults
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="chore/update-defaults-$(date +%Y%m%d)"
          git config user.name "${{ vars.APP_BOT_NAME }}"
          git config user.email "${{ vars.APP_BOT_ID }}+${{ vars.APP_BOT_NAME }}@users.noreply.github.com"

          # Delete existing remote branch if present (from a prior failed run)
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add src/data/
          git commit -m "chore: update runtime defaults

          Signed-off-by: ${{ vars.APP_BOT_NAME }} <${{ vars.APP_BOT_ID }}+${{ vars.APP_BOT_NAME }}@users.noreply.github.com>"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update runtime defaults" \
            --body "Automated daily update of bundled runtime version data." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
